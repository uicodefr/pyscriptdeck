name: Other CI

on:
  push:
    branches:
      - '!develop'
      - '!master'

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      CI: true

    steps:
    - name: Checkout
      uses: actions/checkout@v6

    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: 3.14

    - name: Init
      run: |
        version=$(sed "s/^    version=\"\(.*\)\",$/\1/;t;d" setup.py)
        echo "Version: "$version
        if [[ ! $version =~ "SNAPSHOT" ]]; then
          echo ERROR: Wrong version 1>&2
          exit 1
        fi

    - name: Test
      run: make test
